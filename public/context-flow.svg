<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { font-size: 13px; font-weight: 600; }
    .sublabel { font-size: 11px; font-weight: 400; }
    .arrow { stroke: #e07040; stroke-width: 2; fill: none; marker-end: url(#ah); }
    .box { rx: 10; ry: 10; stroke-width: 2; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e07040"/>
    </marker>
  </defs>

  <!-- Context sources -->
  <rect class="box" x="20" y="20" width="180" height="60" fill="#e0704015" stroke="#e07040"/>
  <text class="label" x="110" y="45" text-anchor="middle" fill="#ccc">📄 Project Definition</text>
  <text class="sublabel" x="110" y="62" text-anchor="middle" fill="#888">Goals, constraints, stack</text>

  <rect class="box" x="20" y="100" width="180" height="60" fill="#e0704015" stroke="#e07040"/>
  <text class="label" x="110" y="125" text-anchor="middle" fill="#ccc">📋 Task Specs</text>
  <text class="sublabel" x="110" y="142" text-anchor="middle" fill="#888">Scoped, ordered work</text>

  <rect class="box" x="20" y="180" width="180" height="60" fill="#e0704015" stroke="#e07040"/>
  <text class="label" x="110" y="205" text-anchor="middle" fill="#ccc">🗂️ Codebase Context</text>
  <text class="sublabel" x="110" y="222" text-anchor="middle" fill="#888">Files, history, patterns</text>

  <!-- Arrows to agent -->
  <line class="arrow" x1="210" y1="50" x2="320" y2="120"/>
  <line class="arrow" x1="210" y1="130" x2="320" y2="130"/>
  <line class="arrow" x1="210" y1="210" x2="320" y2="140"/>

  <!-- Agent box -->
  <rect class="box" x="330" y="85" width="180" height="90" fill="#e0704025" stroke="#e07040" stroke-width="3"/>
  <text class="label" x="420" y="118" text-anchor="middle" fill="#e07040" font-size="16">🔥 Watchfire</text>
  <text class="sublabel" x="420" y="140" text-anchor="middle" fill="#ccc">Context → Agent</text>
  <text class="sublabel" x="420" y="158" text-anchor="middle" fill="#888">Isolated worktree</text>

  <!-- Arrow to output -->
  <line class="arrow" x1="520" y1="130" x2="600" y2="130"/>

  <!-- Output -->
  <rect class="box" x="610" y="85" width="170" height="90" fill="#28c94015" stroke="#28c940"/>
  <text class="label" x="695" y="118" text-anchor="middle" fill="#ccc">✨ Quality Code</text>
  <text class="sublabel" x="695" y="140" text-anchor="middle" fill="#888">On-branch, tested</text>
  <text class="sublabel" x="695" y="158" text-anchor="middle" fill="#888">Ready to merge</text>
</svg>
